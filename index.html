<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>处理表格</title>
</head>

<body>
    <script src="https://unpkg.com/vue@next"></script>

    <div id="Application">

        <table class="widefat">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>图片名称</th>
                    <th>展示日期</th>
                    <th>展示次数</th>
                </tr>
            </thead>
            <tbody v-for="item in newData">
                <tr>
                    <td>{{item.id}}</td>
                    <td>{{item.name}}</td>
                    <td>{{item.date}}</td>
                    <td>{{item.count}}</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        const App = Vue.createApp({
            setup() {
                //原始数据
                const data = [

                    { id: '8', ad: '2', date: '2023-04-22 16:12:41' },
                    { id: '7', ad: '2', date: '2023-04-22 16:12:40' },
                    { id: '6', ad: '2', date: '2023-04-22 16:12:39' },
                    { id: '4', ad: '2199', date: '2023-04-22 16:12:37' }
                ];
                //提取对象中ad相同的值，添加新建count

                const newData = data.map(item => {
                    if (item.ad === '2') {
                        return { ...item, name: 'hh' };
                    }

                    if (item.ad === '2199') {
                        return { ...item, name: '娜娜' };
                    }

                    return { ...item, name: '没有' };
                });



                return {

                    newData,
                };
            },
        });
        App.mount("#Application");
    </script>
</body>

</html>
