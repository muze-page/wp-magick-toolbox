name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: curl, json, mbstring
          tools: composer

      - name: PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n 1 -P 4 php -l

  ts-lint:
    name: TypeScript Lint & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [admin, count, public]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vite/${{ matrix.project }}/package-lock.json

      - name: Install Dependencies
        working-directory: vite/${{ matrix.project }}
        run: npm ci

      - name: Type Check
        working-directory: vite/${{ matrix.project }}
        run: npx tsc --noEmit

      - name: Lint
        working-directory: vite/${{ matrix.project }}
        run: npm run lint --if-present

      - name: Build
        working-directory: vite/${{ matrix.project }}
        run: npm run build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [php-lint, ts-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vite/admin/package-lock.json

      - name: Install Dependencies
        working-directory: vite/admin
        run: npm ci

      - name: Run Vitest
        working-directory: vite/admin
        run: npm run test -- --run --coverage || true
